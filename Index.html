<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ghi chú với liên kết GitHub</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: #fff;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }
    textarea {
      width: 100%;
      height: 200px;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ddd;
      border-radius: 4px;
      resize: none;
    }
    button, a {
      margin-top: 10px;
      display: inline-block;
      padding: 10px 20px;
      font-size: 16px;
      background-color: #007BFF;
      color: white;
      text-decoration: none;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover, a:hover {
      background-color: #0056b3;
    }
    a {
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Ghi chú với liên kết GitHub</h2>
    <textarea id="note" placeholder="Nhập ghi chú của bạn ở đây..."></textarea>
    <button onclick="generateLink()">Tạo liên kết</button>
    <div id="linkContainer" style="margin-top: 20px; display: none;">
      <p>Liên kết của bạn:</p>
      <a id="generatedLink" href="#" target="_blank">Mở ghi chú</a>
    </div>
  </div>

  <script>
    const githubPagesUrl = "https://turbolite.github.io";

    function generateLink() {
      const note = document.getElementById('note').value;
      if (!note.trim()) {
        alert("Vui lòng nhập nội dung ghi chú!");
        return;
      }
      const encodedNote = encodeURIComponent(note);
      const link = `${githubPagesUrl}/?note=${encodedNote}`;
      
      const linkContainer = document.getElementById('linkContainer');
      const generatedLink = document.getElementById('generatedLink');
      
      generatedLink.href = link;
      generatedLink.textContent = link;
      linkContainer.style.display = "block";
    }
  </script>
</body>
</html>
