<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API URL Executor</title>
    <script>
        function openApiUrl() {
            const userInput = document.getElementById('urlInput').value;
            if (!userInput) {
                alert('Vui lòng nhập URL!');
                return;
            }

            const apiUrl = `http://fi4.bot-hosting.net:22869/executor?url=${encodeURIComponent(userInput)}`;
            window.open(apiUrl, '_blank');
        }
    </script>
</head>
<body>
    <h1>Bypass Trigon</h1>
    <label for="urlInput">Nhập Link:</label>
    <input type="text" id="urlInput" placeholder="Nhập URL tại đây" />
    <button onclick="openApiUrl()">Bypass</button>
</body>
</html>
